id: custom-2026-logic-004
info:
  name: Cascading Delete Abuse - Foreign Key Exploitation
  author: SecurityTeam
  severity: high
  description: |
    Exploits cascading delete in relational databases:
    1. Delete parent record (user, organization)
    2. Foreign key cascade deletes related records
    3. Attacker deletes entire dataset via single record
    4. Data integrity compromised, DOS potential
    
    Detection method:
    - Create parent/child records
    - Delete parent record
    - Verify child records deleted via cascade
    - Analyze deletion logging and authorization

requests:
  - method: POST
    path: /api/users
    headers:
      Content-Type: "application/json"
    body: |
      {
        "email": "test@example.com"
      }
    
    extractors:
      - type: json
        internal: true
        name: user_id
        json:
          - '.user_id'

  - method: POST
    path: /api/users/{{user_id}}/settings
    headers:
      Content-Type: "application/json"
    body: |
      {
        "preference": "value"
      }

  - method: DELETE
    path: /api/users/{{user_id}}
    
    matchers:
      - type: status
        status:
          - 200
          - 204

  - method: GET
    path: /api/users/{{user_id}}/settings
    
    matchers:
      - type: word
        part: body
        words:
          - '"error":"not found"'
          - '"error":"deleted"'
        condition: any

tags:
  - logic-flaw
  - cascading-delete
  - data-integrity
  - authorization-bypass
